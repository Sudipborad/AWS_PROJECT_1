<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Placeholder Test</title>
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        .test-case {
            margin-bottom: 30px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        h2 {
            margin-top: 0;
        }
        .image-container {
            border: 1px dashed #999;
            padding: 10px;
            margin-top: 10px;
        }
        img {
            max-width: 100%;
            max-height: 300px;
        }
    </style>
</head>
<body>
    <h1>Image Placeholder Test</h1>
    
    <div class="test-case">
        <h2>1. Relative path</h2>
        <div class="image-container">
            <img src="placeholder.svg" alt="Placeholder (relative path)">
        </div>
    </div>
    
    <div class="test-case">
        <h2>2. Root-relative path</h2>
        <div class="image-container">
            <img src="/placeholder.svg" alt="Placeholder (root-relative path)">
        </div>
    </div>
    
    <div class="test-case">
        <h2>3. Full URL</h2>
        <div class="image-container">
            <img src="http://localhost:3000/placeholder.svg" alt="Placeholder (full URL)">
        </div>
    </div>
    
    <div class="test-case">
        <h2>4. Dynamically constructed URL</h2>
        <div class="image-container" id="dynamic-placeholder">
            <!-- Will be filled by script -->
        </div>
    </div>
    
    <script>
        // For the dynamic test
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('dynamic-placeholder');
            const img = document.createElement('img');
            img.src = `${window.location.origin}/placeholder.svg`;
            img.alt = 'Placeholder (dynamic URL)';
            container.appendChild(img);
            
            // Also output debug info
            const debug = document.createElement('pre');
            debug.textContent = JSON.stringify({
                origin: window.location.origin,
                fullUrl: `${window.location.origin}/placeholder.svg`,
                pathname: window.location.pathname,
                href: window.location.href
            }, null, 2);
            container.appendChild(debug);
        });
    </script>
</body>
</html>
